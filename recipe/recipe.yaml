schema_version: 1

context:
  version: 1.5.5

package:
  name: livekit-plugins-openai
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/l/livekit-plugins-openai/livekit_plugins_openai-${{ version }}.tar.gz
    sha256: fb55baf7096cf2576a2470c91d34a2bb06aa8595f4e8ebf40a90940c81399ad1
  - url: https://raw.githubusercontent.com/livekit/agents/refs/tags/livekit-agents%40${{ version }}/LICENSE
    sha256: c71d239df91726fc519c6eb72d318ec65820627232b2f796219e87dcf35d0ab4
    file_name: LICENSE

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - livekit-agents >=1.5.5
    - openai >=2
tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - '*'
      imports:
        - livekit.plugins.openai
      pip_check: true

about:
  summary: Agent Framework plugin for services from OpenAI
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/livekit-plugins-openai/
  repository: https://github.com/livekit/agents
  documentation: https://docs.livekit.io

extra:
  recipe-maintainers:
    - conda-forge/livekit
